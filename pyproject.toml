[tool.ruff]
src = ["services/api"]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]
ignore = [
    "E501",   # line too long — formatter handles it
    "B008",   # function calls in default args (common in FastAPI)
]

[tool.ruff.lint.isort]
known-first-party = ["config", "core", "graphs", "routers"]

[tool.pyright]
pythonVersion = "3.11"
include = ["services/api"]
typeCheckingMode = "basic"
reportMissingImports = false   # deps not installed in CI type-check step
