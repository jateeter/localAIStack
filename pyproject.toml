[tool.pytest.ini_options]
# Default test run: unit tests only (no network, no Docker)
# Integration tests: pytest --integration  (compose stack must be up)
# Live stack tests:  pytest --live         (PE + RE + localAI all running)
#
# Run from the repo root:
#   pytest services/api/tests/ --ignore=services/api/tests/e2e
# Or from services/api/:
#   pytest tests/ --ignore=tests/e2e
markers = [
    "integration: compose stack integration tests — pass --integration to run",
    "live: full live-stack tests (PE+RE+localAI) — pass --live to run",
]

[tool.ruff]
src = ["services/api"]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]
ignore = [
    "E501",   # line too long — formatter handles it
    "B008",   # function calls in default args (common in FastAPI)
]

[tool.ruff.lint.isort]
known-first-party = ["config", "core", "graphs", "routers"]

[tool.pyright]
pythonVersion = "3.11"
include = ["services/api"]
typeCheckingMode = "basic"
reportMissingImports = false   # deps not installed in CI type-check step
