# localAIStack — Docker Compose
# Ollama runs NATIVELY on macOS (M1 Metal acceleration via `ollama serve`)
# This compose manages: Qdrant, Redis, FastAPI orchestration, Open WebUI

services:

  # ── Vector Database ──────────────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.9.2
    container_name: localai_qdrant
    restart: unless-stopped
    ports:
      - "4333:6333"   # REST API
      - "4334:6334"   # gRPC
    volumes:
      - ./volumes/qdrant:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: "6334"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'cat < /dev/null > /dev/tcp/localhost/6333'"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Cache + LangGraph Checkpointer ───────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: localai_redis
    restart: unless-stopped
    ports:
      - "4379:6379"
    volumes:
      - ./volumes/redis:/data
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── RAG / LangGraph Orchestration API ────────────────────────────────────────
  api:
    build:
      context: ./services/api
      dockerfile: Dockerfile
    container_name: localai_api
    restart: unless-stopped
    ports:
      - "4000:8000"
    environment:
      # Ollama running natively — reachable from Docker via host.docker.internal
      OLLAMA_BASE_URL: "http://host.docker.internal:11434"
      QDRANT_HOST: "qdrant"
      QDRANT_PORT: "6333"
      REDIS_URL: "redis://redis:6379"
      LLM_MODEL: "${LLM_MODEL:-llama3.2:3b}"
      EMBED_MODEL: "${EMBED_MODEL:-nomic-embed-text}"
      COLLECTION_NAME: "${COLLECTION_NAME:-localai_docs}"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
    volumes:
      - ./data/documents:/app/data/documents
      - ./services/api:/app  # live-reload in dev
    depends_on:
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]  # container-internal port
      interval: 15s
      timeout: 5s
      retries: 5

  # ── Browser UI (chat with Ollama models) ─────────────────────────────────────
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: localai_webui
    restart: unless-stopped
    ports:
      - "4080:8080"
    environment:
      OLLAMA_BASE_URL: "http://host.docker.internal:11434"
      WEBUI_SECRET_KEY: "${WEBUI_SECRET_KEY:-changeme-local-dev}"
    volumes:
      - ./volumes/open-webui:/app/backend/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - api

networks:
  default:
    name: localai_net
