name: Security scan

on:
  schedule:
    - cron: "0 8 * * 1"   # every Monday 08:00 UTC
  push:
    paths:
      - "services/api/requirements.txt"
      - "services/api/Dockerfile"
      - ".github/workflows/security.yml"
  workflow_dispatch:

jobs:

  # ── Python dependency audit ─────────────────────────────────────────────────
  pip-audit:
    name: pip-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit requirements
        run: pip-audit -r services/api/requirements.txt --output json --output-file pip-audit.json || true

      - name: Upload audit report
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-report
          path: pip-audit.json

  # ── Docker image scan ───────────────────────────────────────────────────────
  trivy:
    name: Trivy (Docker)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image for scanning
        uses: docker/build-push-action@v6
        with:
          context: ./services/api
          push: false
          load: true
          tags: localaistack-api:scan

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@0.30.0
        with:
          image-ref: localaistack-api:scan
          format: sarif
          output: trivy-image.sarif
          severity: HIGH,CRITICAL
          exit-code: "0"   # report only; don't fail build

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-image.sarif
          category: trivy-docker

  # ── Filesystem scan ─────────────────────────────────────────────────────────
  trivy-fs:
    name: Trivy (filesystem)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.30.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs.sarif
          severity: HIGH,CRITICAL
          exit-code: "0"

      - name: Upload Trivy FS results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs
