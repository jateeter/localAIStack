version: 2

updates:

  # Python dependencies (API service)
  - package-ecosystem: pip
    directory: /services/api
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: America/Chicago
    groups:
      langchain-ecosystem:
        patterns:
          - "langchain*"
          - "langgraph*"
      fastapi-stack:
        patterns:
          - "fastapi"
          - "uvicorn*"
          - "pydantic*"
    ignore:
      # Major version bumps reviewed manually
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    open-pull-requests-limit: 5

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: America/Chicago
    open-pull-requests-limit: 5

  # Docker base images
  - package-ecosystem: docker
    directory: /services/api
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: America/Chicago
    open-pull-requests-limit: 3
